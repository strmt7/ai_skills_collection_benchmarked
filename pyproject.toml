[project]
name = "ai-skills-collection-benchmarked"
version = "0.1.0"
description = "Evidence-backed AI skills catalog with real workflow benchmark definitions."
requires-python = ">=3.10"
dependencies = [
  "PyYAML>=6.0.0",
]

[project.optional-dependencies]
test = [
  "pytest>=7.4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = []
py-modules = []
