name: Secret scan

on:
  push:
  pull_request:

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Secret scan must read full history (fetch-depth: 0 below) but does not need
# to write anywhere. Least-privilege default token per GitHub's secure-use
# guidance: https://docs.github.com/en/actions/reference/security/secure-use
permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (latest as of 2026-01-09).
      # SHA: de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      # actions/setup-python v6.2.0 (latest as of 2026-01-22).
      # SHA: a309ff8b426b58ec0e2a45f0f869d46889d02405
      # https://github.com/actions/setup-python/releases/tag/v6.2.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Scan branch history for secret-shaped text
        run: python3 tools/check_no_secret_patterns.py --history
