name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Secret scan must read full history (fetch-depth: 0 below) but does not need
# to write anywhere. Least-privilege default token per GitHub's secure-use
# guidance: https://docs.github.com/en/actions/reference/security/secure-use
permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2 (latest as of 2026-01-09).
      # SHA: de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      # actions/setup-python v6.2.0 (latest as of 2026-01-22).
      # SHA: a309ff8b426b58ec0e2a45f0f869d46889d02405
      # https://github.com/actions/setup-python/releases/tag/v6.2.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Scan branch history for secret-shaped text (in-repo regex + entropy)
        run: python3 tools/check_no_secret_patterns.py --history

      # Second opinion: gitleaks (MIT). Pinned to v8.30.1 with SHA256 verified
      # from the upstream release on 2026-03-21:
      # https://github.com/gitleaks/gitleaks/releases/tag/v8.30.1
      # We avoid gitleaks-action v2 because it requires a commercial licence
      # for non-OSS use; the binary itself stays MIT.
      - name: Install gitleaks (pinned binary, SHA256-verified)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tgz" | sha256sum --check --strict -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks against full git history
        run: |
          gitleaks git --redact --verbose --no-banner --exit-code 1 .
