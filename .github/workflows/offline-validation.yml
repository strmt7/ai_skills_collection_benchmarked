name: Offline validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Validate generated JSON
        run: python -m json.tool data/skills_catalog.json >/dev/null
      - name: Validate catalog and mirrors
        run: python tools/validate_catalog.py
      - name: Validate benchmark and provenance artifacts
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, "tools")
          import check_benchmark_artifact

          paths = sorted(Path("artifacts/benchmark-runs").rglob("artifact.json"))
          if not paths:
              raise SystemExit("no benchmark or provenance artifacts recorded")
          for path in paths:
              result = check_benchmark_artifact.validate_artifact(path)
              if result["verdict"] != "artifact_complete":
                  raise SystemExit(f"{path}: {result}")
          print(f"validated {len(paths)} benchmark/provenance artifacts")
          PY
      - name: Validate static benchmark outputs
        run: python tools/run_static_benchmarks.py --check
      - name: Validate skill risk audit
        run: python tools/audit_skill_quality.py --check
      - name: Run tests
        run: python -m pytest -q
      - name: Compile Python
        run: python -m compileall -q tools tests
