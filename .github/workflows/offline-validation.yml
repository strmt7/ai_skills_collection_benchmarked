name: Offline validation

on:
  push:
  pull_request:
  workflow_dispatch:
  # Catch upstream drift (CVE updates, action deprecations) without waiting
  # for a push: weekly Monday 06:00 UTC, ahead of the Dependabot run.
  schedule:
    - cron: "0 6 * * 1"

# Cancel superseded in-progress runs for the same ref so queued pushes do not
# stack up in CI. See the concurrency docs:
# https://docs.github.com/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: offline-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token per GitHub's secure-use guidance:
# https://docs.github.com/en/actions/reference/security/secure-use
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # actions/checkout v6.0.2 (latest as of 2026-01-09).
      # SHA: de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # https://github.com/actions/checkout/releases/tag/v6.0.2
      - uses: actions/checkout@v6.0.2
      # actions/setup-python v6.2.0 (latest as of 2026-01-22).
      # SHA: a309ff8b426b58ec0e2a45f0f869d46889d02405
      # https://github.com/actions/setup-python/releases/tag/v6.2.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install test dependencies
        run: python -m pip install -e '.[test]'
      - name: Validate generated JSON
        run: python -m json.tool data/skills_catalog.json >/dev/null
      - name: Validate catalog and mirrors
        run: python tools/validate_catalog.py
      - name: Validate benchmark and provenance artifacts
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, "tools")
          import check_benchmark_artifact

          paths = sorted(Path("artifacts/benchmark-runs").rglob("artifact.json"))
          if not paths:
              raise SystemExit("no benchmark or provenance artifacts recorded")
          for path in paths:
              result = check_benchmark_artifact.validate_artifact(path)
              if result["verdict"] != "artifact_complete":
                  raise SystemExit(f"{path}: {result}")
          print(f"validated {len(paths)} benchmark/provenance artifacts")
          PY
      - name: Validate static benchmark outputs
        run: python tools/run_static_benchmarks.py --check
      - name: Validate skill risk audit
        run: python tools/audit_skill_quality.py --check
      - name: Run tests (with coverage)
        run: python -m pytest -q -n auto
      - name: Upload coverage.xml
        if: always()
        # actions/upload-artifact v7.0.1 (latest stable April 2026).
        # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14
      - name: Compile Python
        run: python -m compileall -q tools tests
