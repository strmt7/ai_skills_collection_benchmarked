name: pip-audit

on:
  push:
  pull_request:
  workflow_dispatch:
  # Daily CVE scan in case a transitive dep advisory drops between commits.
  schedule:
    - cron: "15 6 * * *"

concurrency:
  group: pip-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[security]'

      - name: Audit pyproject (all extras)
        run: pip-audit --strict --requirement requirements-lock.txt

      - name: Verify lockfile is in sync with pyproject.toml
        run: |
          set -euo pipefail
          python -m pip install pip-tools
          pip-compile \
            --generate-hashes \
            --extra=test --extra=lint --extra=security \
            --output-file=/tmp/requirements-lock.check.txt \
            pyproject.toml
          # Drop autogen timestamp/command lines before diffing so pip-compile
          # metadata doesn't trip the check.
          diff -u \
            <(grep -v '^#' requirements-lock.txt) \
            <(grep -v '^#' /tmp/requirements-lock.check.txt)
